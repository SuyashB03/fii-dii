<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FII DII Institutional Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0a0c10;
color:white;
padding:40px
}

.card{
background:#141821;
padding:20px;
border-radius:12px;
margin-bottom:20px
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px
}

.green{color:#00d09e}
.red{color:#fb3640}

.bar{
height:6px;
background:#2a2f3a;
border-radius:3px;
overflow:hidden;
margin-top:6px
}

.fill{
height:6px;
background:#00d09e;
width:50%
}

.big{
font-size:32px;
font-weight:700
}

</style>
</head>

<body>

<h1>Institutional Flow Terminal</h1>

<div class="card">

<h3>Cash Market Flows</h3>

<div>
FII Net:
<span id="fiiCash" class="big">—</span>
</div>

<div>
DII Net:
<span id="diiCash" class="big">—</span>
</div>

</div>


<div class="grid">

<div class="card">

<h3>FII Index Futures</h3>

Long: <span id="fiiLong">—</span><br>
Short: <span id="fiiShort">—</span>

<div class="bar">
<div id="fiiBar" class="fill"></div>
</div>

Net:
<div id="fiiNet" class="big">—</div>

</div>


<div class="card">

<h3>DII Index Futures</h3>

Long: <span id="diiLong">—</span><br>
Short: <span id="diiShort">—</span>

<div class="bar">
<div id="diiBar" class="fill"></div>
</div>

Net:
<div id="diiNet" class="big">—</div>

</div>


<div class="card">

<h3>Options Sentiment</h3>

Put Call Ratio

<div id="pcrValue" class="big">—</div>

<div id="pcrSentiment"></div>

</div>

</div>


<canvas id="flowChart" height="120"></canvas>


<script>

const proxy =
"https://api.allorigins.win/raw?url="

async function fetchJSON(url){

const res =
await fetch(proxy+encodeURIComponent(url))

return await res.json()

}


async function loadData(){

try{

const fno =
await fetchJSON(
"https://www.nseindia.com/api/participant-wise-oi"
)

const flows =
await fetchJSON(
"https://www.nseindia.com/api/fiidiiTradeReact"
)

const option =
await fetchJSON(
"https://www.nseindia.com/api/option-chain-indices?symbol=NIFTY"
)

updateFNO(fno)
updateFlows(flows)
updatePCR(option)

}catch(e){
console.log(e)
}

}


function updateFlows(data){

const latest = data.data[0]

document.getElementById("fiiCash").innerText =
"₹"+latest.fii

document.getElementById("diiCash").innerText =
"₹"+latest.dii

}


function updateFNO(data){

const fii =
data.data.find(x=>x.clientType==="FII")

const dii =
data.data.find(x=>x.clientType==="DII")

fillFuture(
"fii",
fii.futureIndexLong,
fii.futureIndexShort
)

fillFuture(
"dii",
dii.futureIndexLong,
dii.futureIndexShort
)

}


function fillFuture(prefix,long,short){

document.getElementById(prefix+"Long")
.innerText = long.toLocaleString()

document.getElementById(prefix+"Short")
.innerText = short.toLocaleString()

const net = long-short

document.getElementById(prefix+"Net")
.innerText = net.toLocaleString()

const pct = (long/(long+short))*100

document.getElementById(prefix+"Bar")
.style.width = pct+"%"

}


function updatePCR(chain){

let call=0
let put=0

chain.records.data.forEach(x=>{

if(x.CE) call+=x.CE.openInterest
if(x.PE) put+=x.PE.openInterest

})

const pcr = put/call

document.getElementById("pcrValue")
.innerText = pcr.toFixed(2)

let sentiment="Neutral"

if(pcr>1.2) sentiment="Bullish"
if(pcr<0.8) sentiment="Bearish"

document.getElementById("pcrSentiment")
.innerText = sentiment

}


loadData()

setInterval(loadData,300000)

</script>

</body>
</html>
